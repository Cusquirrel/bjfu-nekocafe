server:
  port: 8080
spring:
  application:
    name: nekocafe-lab3
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nekocafe}
    username: ${SPRING_DATASOURCE_USERNAME:nekocafe}
    password: ${SPRING_DATASOURCE_PASSWORD:nekocafe_dev_password}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
logging:
  level:
    root: INFO
    com.bjfu.nekocafe: INFO
---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:nekocafe;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
