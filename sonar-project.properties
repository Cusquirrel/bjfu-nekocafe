sonar.projectKey=nekocafe
sonar.projectName=NekoCafe
sonar.sourceEncoding=UTF-8
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/src/__tests__,tests/e2e,tests/accessibility
sonar.java.binaries=backend/target/classes
sonar.coverage.jacoco.xmlReportPaths=tests/reports/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=tests/reports/frontend-coverage/lcov.info
sonar.exclusions=frontend/node_modules/**,frontend/dist/**,backend/target/**,tests/reports/**
sonar.test.inclusions=**/*Test.java,**/*.test.ts,**/*.test.tsx,**/*.spec.ts
