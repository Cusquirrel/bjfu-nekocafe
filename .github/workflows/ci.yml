name: NekoCafe CI
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '8' }
      - name: Backend unit and integration tests
        working-directory: backend
        run: mvn -B test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install and test frontend
        working-directory: frontend
        run: |
          npm install
          npm run test
          npm run build
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
      - name: Export compose config
        run: docker compose config > compose.resolved.yml
      - uses: actions/upload-artifact@v4
        with:
          name: compose-resolved
          path: compose.resolved.yml
