apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels: { app: {{ .Release.Name }}-backend }
  template:
    metadata:
      labels: { app: {{ .Release.Name }}-backend }
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          ports: [{ containerPort: {{ .Values.backend.port }} }]
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://{{ .Values.postgres.host }}:5432/{{ .Values.postgres.database }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.postgres.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.postgres.passwordSecret }}, key: password } }
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: {{ .Values.backend.port }} }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: {{ .Values.backend.port }} }
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
spec:
  selector: { app: {{ .Release.Name }}-backend }
  ports: [{ port: 8080, targetPort: {{ .Values.backend.port }} }]
