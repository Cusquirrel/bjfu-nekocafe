groups:
  - name: nekocafe-lab3
    rules:
      - alert: NekoCafeBackendDown
        expr: up{job="nekocafe-backend"} == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: NekoCafe backend is down
      - alert: NekoCafeHighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: NekoCafe backend 5xx error rate is high
